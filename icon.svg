<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect x="8" y="8" width="240" height="240" rx="32" ry="32" fill="#1a1a2e" stroke="#0099dd" stroke-width="3"/>

  <!-- Speaker body -->
  <rect x="52" y="76" width="28" height="50" rx="3" fill="#00ccff"/>
  <!-- Speaker cone -->
  <polygon points="80,76 116,52 116,152 80,126" fill="#00ccff"/>

  <!-- Sound waves -->
  <path d="M 130 82 Q 146 68, 146 102 Q 146 136, 130 122" stroke="#00ccff" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M 146 64 Q 168 50, 168 102 Q 168 154, 146 140" stroke="#00ccff" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M 162 46 Q 190 28, 190 102 Q 190 176, 162 158" stroke="#00ccff" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- Text "ROTATION" -->
  <text x="128" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" letter-spacing="3" fill="#00ccff">ROTATION</text>
